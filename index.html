<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator By BJustin07</title>
    <script src="script.js" defer></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
            <h1>By BJustin07</h1>
    <div class="calculator-container">
        <div class="calculator-screen"></div>
        <div class="calculator-buttons">
            <div class="numeric-buttons">
                <div class="buttons">
                    <button>clear</button>
                    <button>/</button>
                    <button>x</button>
                    <button>delete</button>
                </div>
                <div class="buttons">
                    <button>7</button>
                    <button>8</button>
                    <button>9</button>
                    <button>-</button>
                </div>
                <div class="buttons">
                    <button>4</button>
                    <button>5</button>
                    <button>6</button>
                    <button id="plus">+</button>
                </div>
                <div class="buttons">
                    <button>1</button>
                    <button>2</button>
                    <button>3</button>
                    <button id="decimal">.</button>
                </div>
                <div class="bottom-buttons">
                    <button id="zeroButton">0</button>
                    <button id="equalsButton">=</button>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
